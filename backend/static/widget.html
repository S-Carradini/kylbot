<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blue - Kyl Center for Water Policy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: Arial, sans-serif;
    background: #f0f4f8 url('/static/images/map-background.png') center / cover no-repeat;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  #header {
    background: #0a3d62;
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #header-avatar {
    width: 38px;
    height: 38px;
    background: #3ec1d3;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  #header-title { font-size: 14px; font-weight: bold; }
  #header-subtitle { font-size: 11px; opacity: 0.8; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #3ec1d3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: #0a3d62; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    background: white;
    color: #333;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .msg.user .msg-bubble { background: #0a3d62; color: white; }

  #quick-topics { padding: 0 16px 12px; flex-shrink: 0; }
  #quick-topics p {
    font-size: 11px;
    color: #888;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #quick-topics-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .topic-btn {
    padding: 6px 14px;
    border: 1.5px solid #0a3d62;
    border-radius: 20px;
    font-size: 12px;
    color: #0a3d62;
    cursor: pointer;
    background: white;
    transition: all 0.2s;
  }
  .topic-btn:hover { background: #0a3d62; color: white; }

  #input-area {
    padding: 12px 16px;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    background: white;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #ccc;
    border-radius: 24px;
    font-size: 13px;
    outline: none;
  }
  #user-input:focus { border-color: #3ec1d3; }
  #send-btn {
    width: 40px;
    height: 40px;
    background: #0a3d62;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send-btn:hover { background: #3ec1d3; }
  #send-btn:disabled { opacity: 0.5; cursor: default; }

  .typing { color: #888; font-style: italic; font-size: 12px; padding: 4px 8px; }
</style>
</head>
<body>

  <div id="header">
    <div id="header-avatar">💧</div>
    <div>
      <div id="header-title">Blue · Arizona Water Blueprint</div>
      <div id="header-subtitle">Kyl Center for Water Policy</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar">💧</div>
      <div class="msg-bubble">
        Hi! I'm Blue, your guide to the Arizona Water Blueprint. I can help you understand water security,
        Active Management Areas, groundwater trends, Colorado River impacts, and more. What are you wondering about?
      </div>
    </div>
  </div>

  <div id="quick-topics">
    <p>QUICK TOPICS</p>
    <div id="quick-topics-btns">
      <button class="topic-btn" onclick="sendMessage('How secure is my water supply?')">Water security</button>
      <button class="topic-btn" onclick="sendMessage('Is my address within an Active Management Area?')">Find my AMA</button>
      <button class="topic-btn" onclick="sendMessage('How will the Colorado River shortage impact me?')">Colorado River</button>
      <button class="topic-btn" onclick="sendMessage('How are AZs groundwater levels trending?')">Groundwater trends</button>
    </div>
  </div>

  <div id="input-area">
    <input id="user-input" type="text"
      placeholder="Ask about Arizona water..."
      onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <script>
    // Same-origin by default (this page is served by the FastAPI backend itself).
    // Override by loading this file with ?api=https://your-backend-url in the iframe src
    // if the widget is ever hosted somewhere other than the backend.
    const params = new URLSearchParams(window.location.search);
    const BACKEND_URL = params.get('api') || '';

    async function sendMessage(text) {
      const input = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const message = text || input.value.trim();
      if (!message) return;

      document.getElementById('quick-topics').style.display = 'none';

      addMessage(message, 'user');
      input.value = '';
      sendBtn.disabled = true;

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = 'Blue is typing...';
      document.getElementById('messages').appendChild(typing);
      typing.scrollIntoView({ behavior: 'smooth', block: 'start' });

      try {
        const body = new FormData();
        body.append('user_query', message);

        const res = await fetch(`${BACKEND_URL}/chat_api`, {
          method: 'POST',
          credentials: 'include',
          body,
        });

        document.getElementById('typing')?.remove();

        if (!res.ok) throw new Error(`Backend returned ${res.status}`);
        const data = await res.json();
        const reply = (data.resp || '')
          .replace(/<\/p>\s*<p>/gi, '\n\n')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/?p>/gi, '');
        addMessage(reply || 'Sorry, I encountered an error. Please try again.', 'bot');
      } catch (err) {
        document.getElementById('typing')?.remove();
        addMessage('Sorry, I could not connect to the server.', 'bot');
      } finally {
        sendBtn.disabled = false;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function linkify(text) {
      // Markdown links [Name](url) first, so the link shows the resource name, not the raw URL.
      const withMdLinks = escapeHtml(text).replace(
        /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
        (_match, label, url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`
      );
      // Any remaining bare URLs (not already inside an <a> tag).
      return withMdLinks.replace(
        /(?<!href="|>)(https?:\/\/[^\s)<]+)/g,
        (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
      );
    }

    function addMessage(text, sender) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = linkify(text);
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = sender === 'bot' ? '💧' : '🙂';
      div.appendChild(avatar);
      div.appendChild(bubble);
      msgs.appendChild(div);
      // Scroll the new message into view from its top, so long replies are read
      // from the start instead of jumping straight to the bottom.
      div.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>

</body>
</html>
